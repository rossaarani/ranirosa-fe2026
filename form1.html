<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Formulir Pendaftaran Lomba</title>
<body>

<h2>Form Pendaftaran Lomba Spekta 2026</h2>
<hr>

<form action="" method="post">

    <label>Nama Siswa</label> :
    <input type="text" name="nama" placeholder="Nama Lengkap" required><br><br>

    <label>Asal Sekolah</label> :
    <input type="text" name="Asal Sekolah"><br><br>

    <label>Email:</label><br>
    <input type="email" name="email" placeholder="example@gmail.com" required><br><br>

    <label>Pilihan Lomba</label> :
    <select name="Lomba">
        <option value="Debat">Debat</option>
        <option value="Poster Digital">Poster digital</option>
        <option value="Fotografi">fotografi</option>
        <option value="Menyanyi">Menyanyi</option>
        <option value="Video kreatif">Video kreatif</option>
    </select><br><br>

    <label>Asal kota</label> :
    <select name="Asal Kota">
        <option value="Semarangt">Semarang</option>
        <option value="Jakarta">Jakarta</option>
        <option value="Bandung">Bandung</option>
        <option value="Banjarmasin">Banjarmasin</option>
        <option value="Bali">Bali</option>
        <option value="Flores">Flores</option>
        <option value="Surabaya">Surabaya</option>
    </select><br><br>

    <label>Alamat</label> :<br>
    <textarea name="alamat" rows="4" cols="40"></textarea><br><br>

    <label>No Telp/HP</label> :
    <input type="text" name="telp"><br><br>

    <label>Jenis Kelamin</label> :
    <input type="radio" name="jk" value="Pria"> Pria
    <input type="radio" name="jk" value="Wanita"> Wanita<br><br>

    <label>Upload karya</label>
    <input type="file" name="foto"><br><br>

    <input type="submit" value="SUBMIT">

</form>

</body>
</html>
