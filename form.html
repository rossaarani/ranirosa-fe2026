<body>
    <!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Form Pendaftaran</title>
</head>
<body>

<h2>Formulir Pendaftran KAIST</h2>
<hr>

<form action="prosess-form.php" method="POST">
    <label>asal sekolah:</label>
    <input type="text" name="asal_sekolah" placeholder="asal sekolah" required><br><br>

    <label>tahun lulus:</label>
    <input type="text" name="tahun_lulus" placeholder="tahun lulus" required><br><br>

    <label>jurusan yang akan di pilih</label>
    <input type="text" name="jurusan" placeholder="jurusan yang akan di pilih" required><br><br>

    <label>kelas yang ditingalkan:</label>
    <input type="text" name="kelas yang ditinggalkan" placeholder="kelas yang ditinggalkan" required><br><br>

    <label>Nama Lengkap:</label><br>
    <input type="text" name="nama" placeholder="nama lengkap" required><br><br>

    <label>Email:</label><br>
    <input type="email" name="email" placeholder="example@gmail.com" required><br><br>

    <label>Password:</label><br>
    <input type="password" name="password" placeholder="password"required><br><br>

    <label>Jenis Kelamin:</label><br>
    <input type="radio" name="jk" value="Pria"> Pria
    <input type="radio" name="jk" value="Wanita"> Wanita<br><br>

    <label>Hobi:</label><br>
    <input type="checkbox" name="hobi[]" value="Membaca"> Membaca
    <input type="checkbox" name="hobi[]" value="Menulis"> Menulis
    <input type="checkbox" name="hobi[]" value="Olahraga"> Olahraga
    <input type="checkbox" name="hobi[]" value="Menggambar"> Menggambar
    <input type="checkbox" name="hobi[]" value="tidur"> tidur
    <br><br>

    <label>Tanggal Lahir:</label><br>
    <input type="date" name="tanggal_lahir"><br><br>

    <label>Asal Negara:</label><br>
    <select name="negara">
        <option value="">-- Pilih Negara --</option>
        <option value="korea selatan">korea selatan</option>
        <option value="Sleman">indonesia</option>
        <option value="Bantul">Malaysia</option>
        <option value="Gunung Kidul">korea utara</option>
        <option value="Kulon Progo">jepang</option>
        <option value="Yogyakarta">rusia</option>
        <option value="semarang">finlandia</option>
        <option value="manado">brunei darussalam</option>
        <option value="belanda">belanda</option>
    </select><br><br>

    <label>Komentar:</label><br>
    <textarea name="komentar" rows="4" cols="40" placeholder="Tulis komentar..."></textarea><br><br>

    <label>Upload File:</label><br>
    <input type="file" name="file"><br><br>

    <input type="submit" value="Kirim">
    <input type="reset" value="Reset">

</form>
</body>
</html>
